<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Valid Uniformes</title>
    <link rel="stylesheet" href="./CSS/Style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body class="login-body" style="background: linear-gradient(rgba(0, 27, 61, 0.3), rgba(0, 27, 61, 0.7)), url('./IMG/Tela_Login.png') center/cover;">
    <div class="login-card">
        <h2>Acesso ao Portal</h2>
        <p>Digite sua matrícula para continuar</p>
        
        <div class="input-group">
            <label for="matricula">Matrícula</label>
            <input type="text" id="matricula" placeholder="Ex: 847291">
        </div>
        
        <button class="btn-login" onclick="fazerLogin()">ENTRAR NO SISTEMA</button>
    </div>

    <script src="./JS/Script.js"></script>
</body>
</html>
