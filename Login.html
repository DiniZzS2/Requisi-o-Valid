<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Valid Uniformes</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="./CSS/login-animations.css">
    
    <script src="./JS/Script.js" defer></script>
</head>
<body class="login-body">

    <div class="bg-rings" aria-hidden="true">
        <div class="glow-ring"></div>
        <div class="glow-ring glow-ring-2"></div>
    </div>

    <main class="login-card">
        <div class="card-line"></div>

        <header class="logo-area">
            <div class="logo-icon">
                <svg viewBox="0 0 24 24" fill="white" width="28" height="28" aria-label="Logo Valid">
                    <path d="M12 2L2 7l10 5 10-5-10-5zm0 7L2 9v6l10 5 10-5V9l-10 5z"/>
                </svg>
            </div>
            <h2>Acesso ao Portal</h2>
            <p>Digite sua matrícula e senha para continuar</p>
        </header>

        <form class="input-group" id="form-login">
            
            <div style="margin-bottom: 20px;">
                <label for="matricula">Matrícula</label>
                <input type="text" id="matricula" placeholder="Ex: 847291" autocomplete="username">
            </div>
            
            <div style="margin-bottom: 24px;">
                <label for="senha">Senha de Acesso</label>
                <input type="password" id="senha" placeholder="••••••••" autocomplete="current-password">
            </div>

            <button type="submit" class="btn-login" id="btn-entrar">Entrar no sistema</button>
            
        </form>
    </main>

</body>
</html>
