<!DOCTYPE html>

<head>

    <title>Painel do Gestor | Valid Uniformes</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="./CSS/Style.css">

<body class="gestor-body">

    <nav class="navbar scrolled" id="navbar">

            Valid <span style="font-size: 14px; font-weight: 300; color: #ffff; margin-left: 8px;">| Gestão de Exceções</span>
        </div>
        <div class="nav-right">
            <span class="nav-matricula">Gestor: <strong id="display-matricula">---</strong></span>
            <button class="nav-btn accent" onclick="location.href='index.html'">Voltar ao Início</button>

    </nav>

    <main class="section gestor-main">
        <div class="quadradinho" data-uwid="365"></div>
        <br>
        <div class="section-intro">
            <h2>Aprovações Pendentes</h2>
            <p>Analise as solicitações de exceção abertas pela sua equipe. Pedidos aprovados liberam imediatamente a cota do colaborador no sistema.</p>
        </div>

        <div class="uniforms-grid" id="lista-pendencias"></div>
    </main>

    <div class="toast" id="toast">
        <div class="toast-icon">✓</div>
        <span id="toast-msg">Ação realizada.</span>
    </div>
